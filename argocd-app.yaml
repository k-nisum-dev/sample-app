apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  source:
    repoURL: 'https://github.com/yourusername/sample-app.git'  # Replace with your repository URL
    targetRevision: HEAD
    path: chart
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
